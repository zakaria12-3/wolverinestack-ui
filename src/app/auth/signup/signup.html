<div class="min-h-screen flex items-center justify-center p-4">
  <div class="glass-panel rounded-xl max-w-lg w-full p-8">

    <!-- Header -->
    <div class="text-center mb-8">
      <span class="font-label-caps text-[10px] text-secondary-fixed-dim tracking-[0.2em] block mb-2">JOIN THE ELITE</span>
      <h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">Create Account</h1>
      <p class="font-body-md text-on-surface-variant mt-2">Start your fitness journey with TITAN.</p>
    </div>

    <form #signupForm="ngForm" (ngSubmit)="onSubmit(signupForm)">
      <!-- Core Fields -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
          <label class="font-label-caps text-[9px] text-on-surface-variant block mb-2">FULL NAME</label>
          <input type="text" name="username" placeholder="John Doe" required
                 [(ngModel)]="user.username" class="input-titan w-full">
        </div>
        <div>
          <label class="font-label-caps text-[9px] text-on-surface-variant block mb-2">EMAIL</label>
          <input type="email" name="email" placeholder="m@example.com" required
                 [(ngModel)]="user.email" class="input-titan w-full">
        </div>
        <div>
          <label class="font-label-caps text-[9px] text-on-surface-variant block mb-2">PASSWORD</label>
          <input type="password" name="password" required
                 [(ngModel)]="user.password" class="input-titan w-full">
        </div>
        <div>
          <label class="font-label-caps text-[9px] text-on-surface-variant block mb-2">CONFIRM PASSWORD</label>
          <input type="password" name="confirmPassword" required
                 [(ngModel)]="user.confirmPassword" class="input-titan w-full">
        </div>
      </div>

      <!-- Optional Fitness Fields -->
      <div class="mt-8 pt-6 border-t border-white/5">
        <span class="font-label-caps text-[9px] text-primary-container tracking-[0.15em] block mb-4">
          <span class="material-symbols-outlined text-sm align-text-bottom">fitness_center</span> OPTIONAL: BODY METRICS
        </span>
        <p class="font-label-caps text-[8px] text-on-surface-variant opacity-60 mb-4">
          Add now or set up later in onboarding.
        </p>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
          <div>
            <label class="font-label-caps text-[8px] text-on-surface-variant block mb-2">GENDER</label>
            <select [(ngModel)]="user.gender" name="gender" class="select-titan w-full text-sm">
              <option value="">—</option>
              <option value="MALE">Male</option>
              <option value="FEMALE">Female</option>
            </select>
          </div>
          <div>
            <label class="font-label-caps text-[8px] text-on-surface-variant block mb-2">WEIGHT (KG)</label>
            <input type="number" name="weight" placeholder="75" [(ngModel)]="user.weightKg" class="input-titan w-full text-sm">
          </div>
          <div>
            <label class="font-label-caps text-[8px] text-on-surface-variant block mb-2">HEIGHT (CM)</label>
            <input type="number" name="height" placeholder="175" [(ngModel)]="user.heightCm" class="input-titan w-full text-sm">
          </div>
          <div>
            <label class="font-label-caps text-[8px] text-on-surface-variant block mb-2">DATE OF BIRTH</label>
            <input type="date" name="dob" [(ngModel)]="user.dateOfBirth" class="input-titan w-full text-sm">
          </div>
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-primary w-full mt-8" [disabled]="isLoading">
        <span class="material-symbols-outlined text-sm">person_add</span>
        {{ isLoading ? 'CREATING ACCOUNT...' : 'CREATE ACCOUNT' }}
      </button>
    </form>

    <!-- Footer -->
    <div class="text-center mt-6">
      <p class="font-label-caps text-[10px] text-on-surface-variant">
        Already have an account?
        <a routerLink="/login" class="text-primary-container hover:text-primary-fixed-dim transition-colors">Sign In</a>
      </p>
    </div>
  </div>
</div>
