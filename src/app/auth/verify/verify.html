<div class="signup-container relative" id="sg" @fadeSlide>
  <section class="card" hlmCard>

    <!-- Header -->
    <div hlmCardHeader class="px-4">
      <h1 hlmCardTitle class="ml-1 text-2xl xl:text-4xl font-bold">
        <strong>Verify your account</strong>
      </h1>
      <p hlmCardDescription>
        Enter your details below to verify your account
      </p>
    </div>
    <br>

    <!-- Content -->
    <div hlmCardContent>
      <form #signupForm="ngForm" (ngSubmit)="onSubmit(signupForm)">

        <div class="form-grid">

          <!-- Email -->
          <div class="field">
            <label hlmLabel for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="m@example.com"
              required
              hlmInput
              [(ngModel)]="user.email"
              class="bg-white/10 backdrop-blur-md"
            />
          </div>

          <!-- Verification Code -->
          <div class="field">
            <label hlmLabel for="verificationCode">Verification Code</label>
            <input
              type="text"
              id="verificationCode"
              name="verificationCode"
              required
              hlmInput
              [(ngModel)]="user.verificationCode"
              class="bg-white/10 backdrop-blur-md"
            />
          </div>

        </div>

        <!-- Submit button INSIDE form -->
        <div class="mt-4">
          <button
            hlmBtn
            type="submit"
            class="primary-btn w-full font-semibold rounded-lg py-2 backdrop-blur-md"
          >
            Verify Account
          </button>
        </div>

      </form>
    </div>


    <!-- Footer -->
    <div hlmCardFooter class="mt-4">
      <button
        hlmBtn
        type="button"
        class="primary-btn w-full font-semibold rounded-lg py-2 backdrop-blur-md"
        (click)="onResendCode()"
      >
        Resend Code
      </button>
    </div>

  </section>
</div>

<!-- Popup -->
<div
  *ngIf="showPopup"
  @fadePopup
  class="fixed top-4 right-4 bg-green-600 text-white px-4 py-2 rounded shadow-lg"
>
  ✅ Code sent to: {{ user.email }}
</div>
