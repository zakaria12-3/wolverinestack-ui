<div class="profile-container">
  <div *ngIf="isLoading" class="loading-spinner">
    Loading Profile...
  </div>
  
  <div *ngIf="!isLoading" class="profile-header">
    <img [src]="profile.avatarUrl ? profile.avatarUrl : 'https://images.unsplash.com/photo-1511367461989-f85a21fda167?ixlib=rb-1.2.1&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80'" alt="Avatar" class="avatar">
    
    <div *ngIf="!isEditing" style="display:flex; flex-direction:column; align-items:center; width: 100%;">
      <h1 class="username">{{ profile.username || profile.email }}</h1>
      <div class="headline" *ngIf="profile.headline">{{ profile.headline }}</div>
      <div class="location" *ngIf="profile.location">
        <svg fill="currentColor" width="16" height="16" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        {{ profile.location }}
      </div>
      
      <p class="bio" *ngIf="profile.bio">{{ profile.bio }}</p>
      
      <button class="edit-btn" (click)="toggleEdit()">Edit Profile</button>
    </div>

    <form *ngIf="isEditing" class="edit-form" (ngSubmit)="saveProfile()">
      <div class="form-group">
        <label>Headline</label>
        <input type="text" class="form-control" name="headline" [(ngModel)]="profile.headline" placeholder="E.g., Senior Software Engineer">
      </div>

      <div class="form-group">
        <label>Location</label>
        <input type="text" class="form-control" name="location" [(ngModel)]="profile.location" placeholder="E.g., San Francisco, CA">
      </div>

      <div class="form-group">
        <label>Bio</label>
        <textarea class="form-control" name="bio" [(ngModel)]="profile.bio" placeholder="Tell us about yourself..."></textarea>
      </div>

      <div class="form-group">
        <label>Avatar URL</label>
        <input type="text" class="form-control" name="avatarUrl" [(ngModel)]="profile.avatarUrl" placeholder="Image URL">
      </div>

      <div class="form-actions">
        <button type="submit" class="save-btn">Save Changes</button>
        <button type="button" class="cancel-btn" (click)="toggleEdit()">Cancel</button>
      </div>
    </form>
  </div>
</div>
