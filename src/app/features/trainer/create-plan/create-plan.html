<div class="p-6 flex justify-center items-center min-h-[60vh]" @fadeSlide>
  <div class="glass-card max-w-2xl w-full p-8">
    <div class="mb-8">
      <h2 class="text-3xl font-bold text-white mb-2 flex items-center gap-3">📋 Create Workout Plan</h2>
      <p class="text-slate-300">Design a new workout plan for your clients.</p>
    </div>

    <div class="flex flex-col gap-6">
      <div class="grid gap-2">
        <label class="text-white text-sm font-semibold">Plan Name</label>
        <input class="premium-input" [(ngModel)]="plan.name" placeholder="e.g. Push Pull Legs">
      </div>

      <div class="grid gap-2">
        <label class="text-white text-sm font-semibold">Description</label>
        <textarea class="premium-input min-h-[100px] resize-y" [(ngModel)]="plan.description"
                  placeholder="Describe the plan, goals, target audience..."></textarea>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="grid gap-2">
          <label class="text-white text-sm font-semibold">Difficulty</label>
          <select class="premium-input" [(ngModel)]="plan.difficulty">
            <option *ngFor="let d of difficulties" [value]="d">{{ d }}</option>
          </select>
        </div>
        <div class="grid gap-2">
          <label class="text-white text-sm font-semibold">Days Per Week</label>
          <input type="number" class="premium-input" [(ngModel)]="plan.daysPerWeek" min="1" max="7">
        </div>
      </div>

      <div class="flex gap-4 mt-4">
        <button class="btn-cancel flex-1 premium-button-outline" routerLink="/trainer/dashboard">Cancel</button>
        <button class="premium-button flex-1" (click)="createPlan()" [disabled]="isLoading">
          {{ isLoading ? 'Creating...' : '✅ Create Plan' }}
        </button>
      </div>
    </div>
  </div>
</div>
