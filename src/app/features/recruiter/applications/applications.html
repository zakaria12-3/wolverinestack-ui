<div class="dashboard-content" @fadeSlide>
  <div class="header mb-8">
    <h1 class="text-3xl font-bold text-white mb-2 text-gradient-primary">Job Applications</h1>
    <p class="text-slate-300">Review candidates, evaluate their scores, and manage hiring status.</p>
  </div>

  <div class="glass-table-container">
    <table class="premium-table">
      <thead>
        <tr>
          <th>Candidate</th>
          <th>Job Title</th>
          <th>Score</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let app of applications" class="group">
          <td class="bold">{{ app.candidateName }}</td>
          <td>{{ app.jobTitle }}</td>
          <td>
            <div class="flex items-center gap-2 text-white">
              <span class="text-xl font-semibold">{{ app.score }}</span>
            </div>
          </td>
          <td>
            <span class="status-badge" [class.pending]="app.status === 'PENDING'" [class.accepted]="app.status === 'ACCEPTED'" [class.inactive]="app.status === 'REJECTED'">
              {{ app.status }}
            </span>
          </td>
          <td class="action-cell">
            <button class="btn-toggle !bg-blue-500/20 !text-blue-400 hover:!bg-blue-500/40" (click)="viewCv(app.cvUrl)">
              View CV
            </button>
            <ng-container *ngIf="app.status === 'PENDING'">
              <button class="btn-toggle !bg-green-500/20 !text-green-400 hover:!bg-green-500/40" (click)="accept(app.id)">
                Accept
              </button>
              <button class="btn-delete" (click)="reject(app.id)">
                Reject
              </button>
            </ng-container>
          </td>
        </tr>
        
        <tr *ngIf="applications.length === 0">
          <td colspan="5" class="py-10 text-center text-slate-400">
            No applications received yet.
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- CV Modal Overlay -->
  <div *ngIf="selectedCv" class="premium-modal-overlay">
    <div class="glass-card flex flex-col fade-scale-in w-11/12 md:w-3/4 lg:w-1/2 h-[80vh] p-4 relative">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-bold text-white">Candidate CV</h3>
        <button class="text-slate-400 hover:text-white transition-colors" (click)="closeCv()">
          <span class="text-2xl">✖</span>
        </button>
      </div>
      <div class="flex-1 bg-white/5 rounded-xl overflow-hidden border border-white/10">
        <iframe [src]="cvUrl" width="100%" height="100%" class="border-0"></iframe>
      </div>
    </div>
  </div>
</div>
