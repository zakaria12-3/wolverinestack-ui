<div class="dashboard-content" @fadeSlide>
  <div class="header mb-8 flex flex-col md:flex-row justify-between items-center text-center md:text-left gap-4">
    <div>
       <h1 class="text-3xl font-bold text-white mb-2 text-gradient-primary">Candidate Dashboard</h1>
       <p class="text-slate-300">Discover your next career move. Upload your CV and apply directly.</p>
    </div>
    <div class="flex gap-4">
       <button class="premium-button text-sm w-auto" routerLink="/profile">👤 Profile</button>
       <button class="premium-button text-sm w-auto" routerLink="/feed">🌐 Network Feed</button>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div *ngFor="let job of jobs" class="glass-card flex flex-col justify-between group h-full">
      
      <div class="mb-4">
        <div class="flex flex-col mb-4">
          <h3 class="text-xl font-bold text-white mb-1">{{ job.title }}</h3>
          <span class="text-blue-400 font-semibold mb-2 flex items-center gap-2">
            <span class="text-sm">🏢</span> {{ job.company }}
          </span>
        </div>
        
        <p class="text-slate-300 text-sm mb-4 line-clamp-3 leading-relaxed">
          {{ job.description }}
        </p>
      </div>

      <div class="mt-auto flex flex-col gap-3 pt-4 border-t border-white/10">
        
        <div *ngIf="!job.applied" class="relative">
          <label class="premium-button-outline w-full !text-sm cursor-pointer justify-center border-dashed border-2 flex items-center gap-2">
            <span class="text-lg">📄</span> 
            <span>Select CV File</span>
            <input type="file" class="hidden" (change)="onFileSelected($event)" accept=".pdf,.doc,.docx">
          </label>
        </div>

        <button
          (click)="apply(job.id)"
          [disabled]="job.applied"
          class="w-full text-sm font-semibold !py-3 flex items-center justify-center gap-2 transition-all"
          [ngClass]="job.applied ? 'bg-green-500/20 text-green-400 border border-green-500/30 rounded-xl cursor-not-allowed' : 'premium-button'">
          
          <ng-container *ngIf="!job.applied">
            <span>🚀</span> Apply Now
          </ng-container>
          <ng-container *ngIf="job.applied">
            <span>✅</span> Application Submitted
          </ng-container>
        </button>
      </div>
    </div>
    
    <!-- Empty State -->
    <div *ngIf="jobs.length === 0" class="glass-card flex flex-col justify-center items-center text-center p-10 col-span-full border-dashed border-2 border-white/20">
      <div class="text-5xl mb-4 opacity-50">🧭</div>
      <h3 class="text-xl font-bold text-white mb-2">No Jobs Available</h3>
      <p class="text-slate-400">Check back later for new opportunities.</p>
    </div>
  </div>
</div>
