<div class="min-h-screen flex items-center justify-center p-4 relative" id="sg" @fadeSlide>
  
  <div class="glass-card max-w-2xl w-full p-10 relative z-10">
    <div class="mb-8 text-center">
      <h1 class="text-3xl font-bold text-white mb-2">Create a Recruiter Account</h1>
      <p class="text-slate-300">Enter your official details below to start hiring</p>
      
      <div class="mt-4">
        <a routerLink="/" class="text-blue-400 hover:text-blue-300 font-semibold transition-colors text-sm">
          Already have an account? Sign in
        </a>
      </div>
    </div>

    <form #signupForm="ngForm" (ngSubmit)="onSubmit(signupForm)">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
        <div class="grid gap-2">
          <label class="text-white text-sm font-semibold" for="name">Company / User Name</label>
          <input
            class="premium-input"
            type="text"
            id="name"
            name="name"
            placeholder="John Doe"
            required
            [(ngModel)]="user.name"
          />
        </div>

        <div class="grid gap-2">
          <label class="text-white text-sm font-semibold" for="email">Work Email</label>
          <input
            class="premium-input"
            type="email"
            id="email"
            name="email"
            placeholder="hr@company.com"
            required
            [(ngModel)]="user.email"
          />
        </div>

        <div class="grid gap-2">
          <label class="text-white text-sm font-semibold" for="password">Password</label>
          <input
            class="premium-input"
            type="password"
            id="password"
            name="password"
            required
            [(ngModel)]="user.password"
          />
        </div>

        <div class="grid gap-2">
          <label class="text-white text-sm font-semibold" for="confirmPassword">Confirm Password</label>
          <input
            class="premium-input"
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            required
            [(ngModel)]="user.confirmPassword"
          />
        </div>
      </div>

      <div class="flex flex-col gap-4 max-w-md mx-auto">
        <button type="submit" class="premium-button w-full">
          Create Recruiter Account
        </button>
        <button type="button" class="premium-button-outline w-full">
          Sign up with Google
        </button>
      </div>
    </form>
  </div>
  
  <!-- Decorative background elements -->
  <div class="absolute top-20 left-20 blur-[100px] w-64 h-64 bg-blue-600/20 rounded-full z-0 pointer-events-none"></div>
  <div class="absolute bottom-20 right-20 blur-[100px] w-64 h-64 bg-cyan-600/20 rounded-full z-0 pointer-events-none"></div>
</div>
