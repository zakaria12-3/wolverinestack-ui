<div id="app-content" [class.blur-active]="isLoading">
  <!-- Desktop Sidebar (hidden on mobile via CSS) -->
  <app-sidebar></app-sidebar>

  <!-- Top Navigation Shell -->
  <app-navbar></app-navbar>

  <!-- Main Content Canvas -->
  <main class="lg:pl-60 pt-16 pb-28 px-4 sm:px-gutter max-w-container-max mx-auto min-h-screen">
    <div [@routeAnimations]="o.activatedRouteData?.['animation']">
      <router-outlet #o="outlet"></router-outlet>
    </div>
  </main>

  <!-- Bottom Navigation (Mobile) -->
  @if (isLoggedIn) {
    <nav class="bottom-nav-mobile">
      <a class="bottom-nav-link" routerLink="/member/dashboard" routerLinkActive="text-primary-fixed-dim">
        <span class="material-symbols-outlined text-xl">monitoring</span>
        <span class="bottom-nav-label">Dashboard</span>
      </a>
      <a class="bottom-nav-link" routerLink="/member/workouts" routerLinkActive="text-primary-fixed-dim">
        <span class="material-symbols-outlined text-xl">fitness_center</span>
        <span class="bottom-nav-label">Workouts</span>
      </a>
      <a class="bottom-nav-link" routerLink="/member/nutrition" routerLinkActive="text-primary-fixed-dim">
        <span class="material-symbols-outlined text-xl">nutrition</span>
        <span class="bottom-nav-label">Nutrition</span>
      </a>
      <a class="bottom-nav-link" routerLink="/ai-chat" routerLinkActive="text-primary-fixed-dim">
        <span class="material-symbols-outlined text-xl">auto_awesome</span>
        <span class="bottom-nav-label">AI Coach</span>
      </a>
      <a class="bottom-nav-link" routerLink="/member/progress" routerLinkActive="text-primary-fixed-dim">
        <span class="material-symbols-outlined text-xl">military_tech</span>
        <span class="bottom-nav-label">PRs</span>
      </a>
      <a class="bottom-nav-link" routerLink="/profile" routerLinkActive="text-primary-fixed-dim">
        <span class="material-symbols-outlined text-xl">person</span>
        <span class="bottom-nav-label">Profile</span>
      </a>
    </nav>

    <!-- Floating Action Button (Mobile) -->
    <button class="fab-mobile" (click)="quickAction()">
      <span class="material-symbols-outlined text-3xl">fitness_center</span>
    </button>
  }

  <!-- Unauthenticated Bottom Nav -->
  @if (!isLoggedIn) {
    <nav class="bottom-nav-mobile">
      <a class="bottom-nav-link" routerLink="/">
        <span class="material-symbols-outlined text-xl">home</span>
        <span class="bottom-nav-label">Home</span>
      </a>
      <a class="bottom-nav-link" routerLink="/login">
        <span class="material-symbols-outlined text-xl">login</span>
        <span class="bottom-nav-label">Sign In</span>
      </a>
      <a routerLink="/signup" class="bottom-nav-cta">
        <span class="material-symbols-outlined text-xl">bolt</span>
      </a>
      <a class="bottom-nav-link" routerLink="/ai-chat">
        <span class="material-symbols-outlined text-xl">auto_awesome</span>
        <span class="bottom-nav-label">AI Coach</span>
      </a>
      <a class="bottom-nav-link" routerLink="/feed">
        <span class="material-symbols-outlined text-xl">forum</span>
        <span class="bottom-nav-label">Feed</span>
      </a>
    </nav>
  }
</div>

<div class="loader-overlay" [class.active]="isLoading">
  <app-loader></app-loader>
</div>
